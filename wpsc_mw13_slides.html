<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Innovative Green Transition — MW13 Group Presentation</title>
<style>
:root{--navy:#0f1e33;--navy2:#13243B;--teal:#22b3c0;--green:#3fbf86;--amber:#E7B24A;--muted:#9fb0c3}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;background:var(--navy);color:#eef3f8;font-family:-apple-system,"Segoe UI","Apple SD Gothic Neo",system-ui,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
#prog{position:fixed;top:0;left:0;height:4px;background:linear-gradient(90deg,var(--teal),var(--green));width:0;z-index:30;transition:width .25s}
.deck{position:relative;height:100vh;width:100vw}
.slide{position:absolute;inset:0;display:none;flex-direction:column;justify-content:center;padding:6vh 8vw;opacity:0;transition:opacity .3s}
.slide.on{display:flex;opacity:1}
.title-wrap{max-width:1100px}
.kicker{color:var(--teal);font-weight:800;letter-spacing:.12em;text-transform:uppercase;font-size:clamp(11px,1.6vw,15px);margin-bottom:12px}
h1{font-size:clamp(28px,5.4vw,58px);line-height:1.08;margin:0 0 14px;font-weight:800}
h2{font-size:clamp(22px,3.8vw,40px);line-height:1.14;margin:0 0 16px;font-weight:800}
.sub{color:var(--muted);font-size:clamp(14px,2vw,21px);margin:6px 0}
ul{margin:8px 0 0;padding:0;list-style:none}
li{font-size:clamp(15px,2.3vw,24px);line-height:1.5;margin:12px 0;padding-left:30px;position:relative}
li:before{content:"";position:absolute;left:0;top:.62em;width:11px;height:11px;border-radius:3px;background:var(--teal)}
b{color:#fff}
.why{margin-top:16px;color:var(--muted);font-size:clamp(13px,1.8vw,19px);border-left:3px solid var(--green);padding-left:12px}
.foot{position:fixed;bottom:14px;left:8vw;right:8vw;display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:clamp(10px,1.4vw,13px);z-index:20}
.nav{position:fixed;bottom:10px;right:12px;display:flex;gap:6px;z-index:25}
.nav button{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:7px 12px;font-size:15px;cursor:pointer;font-weight:700}
.nav button:hover{background:rgba(255,255,255,.16)}
.count{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:var(--muted);font-size:13px;z-index:20}
.home{position:fixed;top:12px;left:14px;z-index:25;color:var(--muted);text-decoration:none;font-size:12px;font-weight:700}.home:hover{color:#fff}
.leaflet{display:none}
</style></head>
<body>
<div id="prog"></div>
<a class="home" href="/wpsc/mw13">← MW13 report</a>
<div class="deck" id="deck"><section class="slide on"><div class="title-wrap"><div class="kicker">Loading…</div><h1>Innovative Green Transition</h1><div class="sub">불러오는 중…</div></div></section></div>
<div class="count" id="count"></div>
<div class="nav"><button onclick="go(-1)">‹ Prev</button><button onclick="go(1)">Next ›</button></div>
<div class="foot"><span>Innovative Green Transition · MW13</span><span>Helsinki-Uusimaa · WPSC 2026</span></div>
<script>
var S=[],i=0,N=0;
function show(n){if(!N)return;i=Math.max(0,Math.min(N-1,n));for(var k=0;k<N;k++)S[k].classList.toggle('on',k===i);
 document.getElementById('count').textContent=(i+1)+' / '+N;
 document.getElementById('prog').style.width=(N>1?(i/(N-1)*100):0)+'%';}
function go(d){show(i+d);}
function render(data){
 var deck=document.getElementById('deck');
 var sl=(data&&data.slides)||[];
 if(!sl.length){deck.innerHTML='<section class="slide on"><div class="title-wrap"><h2>슬라이드를 불러오지 못했습니다</h2><div class="sub"><a href="/wpsc/mw13" style="color:#22b3c0">← MW13 보고서</a></div></div></section>';return;}
 deck.innerHTML=sl.map(function(s,ix){var tag=ix===0?'h1':'h2';var kick=ix===0?'<div class="kicker">Mobile Workshop 13 · Cross-cutting theme &#9312;&#65039;</div>':'';return '<section class="slide"><div class="title-wrap">'+kick+'<'+tag+'>'+(s.t||'')+'</'+tag+'>'+(s.b||'')+'</div></section>';}).join('');
 S=document.querySelectorAll('.slide');N=S.length;show(0);
}
document.addEventListener('keydown',function(e){if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){go(1);e.preventDefault();}else if(e.key==='ArrowLeft'||e.key==='PageUp'){go(-1);e.preventDefault();}else if(e.key==='Home'){show(0);}else if(e.key==='End'){show(N-1);}});
document.getElementById('deck').addEventListener('click',function(e){if(e.target.closest('a,button'))return;go(1);});
fetch('/api/wpsc/slides').then(function(r){return r.ok?r.json():null;}).then(function(j){render(j?j.slides:null);}).catch(function(){render(null);});
</script>
</body></html>
